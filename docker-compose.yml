version: '3.8'

services:
  # 1. PHP Web 服務
  db-app:
    build: .
    container_name: my_db_web
    ports:
      - "8080:80"          # 瀏覽網頁請用 localhost:8080
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db-db
    networks:
      - stock-network      #統一網路名稱

  # 2. MariaDB 資料庫
  db-db:
    image: mariadb:10.6
    container_name: my_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: myPassword
      MYSQL_DATABASE: my-db
      MYSQL_USER: mymy
      MYSQL_PASSWORD: myPassword
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      #- ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stock-network

  # 3. phpMyAdmin 管理工具
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: my_pma
    restart: always
    environment:
      PMA_HOST: db-db      # 內部連線使用 service 名稱
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: myPassword
    ports:
      - "8082:80"          # 修正：避免與 8080 衝突，改用 8082
    depends_on:
      - db-db
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge